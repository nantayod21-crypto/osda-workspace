<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSDA Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        /* เอฟเฟกต์เด้งดึ๋งตอนโหลด */
        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-800">

    <div id="main-card" class="w-full max-w-4xl bg-white p-12 rounded-[2rem] shadow-2xl shadow-slate-200/50 border border-white pop-in relative overflow-hidden">
        
        <div class="absolute top-[-10%] left-[-10%] w-48 h-48 bg-orange-100 opacity-20 rounded-full blur-2xl"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-60 h-60 bg-blue-100 opacity-20 rounded-full blur-2xl"></div>

        <div class="relative z-10 flex flex-col items-center">
            
            <div id="login-section" class="text-center w-full max-w-sm">
                <div class="w-20 h-20 bg-gradient-to-br from-orange-400 to-orange-500 text-white rounded-3xl flex items-center justify-center text-4xl font-black mx-auto mb-6 shadow-lg shadow-orange-100">O</div>
                <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter leading-tight mb-2">OSDA <br>Workspace</h1>
                <p class="text-slate-500 mb-10 text-lg">จัดการเอกสารได้ง่ายกว่าเดิม <br>ล็อกอินด้วยเมล @kmitl.ac.th เลย! 👋</p>

                <div class="flex justify-center bg-white p-3 rounded-2xl shadow-sm border border-slate-200 w-max mx-auto hover:shadow-md transition-shadow">
                    <div id="g_id_onload"
                         data-client_id="459753648639-ki35pndmckk5lqjgobjeoe804jgs44un.apps.googleusercontent.com"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>
                    <div class="g_id_signin" data-type="standard" data-shape="rectangular" data-theme="outline" data-text="signin_with" data-size="large" data-logo_alignment="left"></div>
                </div>
            </div>

            <div id="apps-section" class="hidden text-center w-full">
                <div class="mb-10 max-w-sm mx-auto">
                    <div class="inline-block px-4 py-1.5 bg-green-100 text-green-700 rounded-full text-sm font-bold mb-4">เข้าสู่ระบบแล้ว 🎉</div>
                    <h1 class="text-3xl font-extrabold text-slate-800">สวัสดี, <span id="user-name" class="text-orange-600"></span></h1>
                    <p class="text-slate-500 mt-2">วันนี้คุณอยากใช้งานระบบไหนดี?</p>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-10">
                    
                    <a href="ส่งข้อมูล.html" class="group bg-white p-8 rounded-[2rem] shadow-sm hover:shadow-xl border border-slate-100 hover:border-orange-300 transition-all text-center cursor-pointer flex flex-col items-center">
                        <div class="w-20 h-20 bg-orange-50 group-hover:bg-orange-500 rounded-full flex items-center justify-center text-4xl mb-5 transition-colors group-hover:scale-110 duration-300 shadow-inner">📤</div>
                        <h3 class="font-extrabold text-slate-800 text-xl group-hover:text-orange-600 transition-colors">ส่งเอกสาร</h3>
                        <p class="text-sm text-slate-500 mt-2">ออกเลขและบันทึก<br>การส่งออก</p>
                    </a>

                    <a href="receiver.html" class="group bg-white p-8 rounded-[2rem] shadow-sm hover:shadow-xl border border-slate-100 hover:border-blue-300 transition-all text-center cursor-pointer flex flex-col items-center">
                        <div class="w-20 h-20 bg-blue-50 group-hover:bg-blue-500 rounded-full flex items-center justify-center text-4xl mb-5 transition-colors group-hover:scale-110 duration-300 shadow-inner">📥</div>
                        <h3 class="font-extrabold text-slate-800 text-xl group-hover:text-blue-600 transition-colors">รับเคาน์เตอร์</h3>
                        <p class="text-sm text-slate-500 mt-2">ลงทะเบียนรับ<br>เอกสารเข้า</p>
                    </a>

                </div>
                
                <div class="mt-12 text-center max-w-sm mx-auto border-t border-slate-100 pt-8">
                    <button onclick="logout()" class="text-slate-400 hover:text-red-500 font-semibold transition-colors underline decoration-slate-300 hover:decoration-red-300 underline-offset-4">👋 ออกจากระบบ</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const payload = JSON.parse(jsonPayload);
                const email = payload.email;
                const name = payload.name;

                // เช็คเมลมอ
                if (email.includes('kmitl.ac.th')) {
                    sessionStorage.setItem('osda_auth', 'true');
                    sessionStorage.setItem('osda_user', email);
                    sessionStorage.setItem('osda_name', name);
                    
                    showApps(name);
                    
                    Swal.fire({
                        icon: 'success',
                        title: 'เข้าสู่ระบบแล้ว!',
                        text: 'พร้อมลุยงานกันเลย',
                        showConfirmButton: false,
                        timer: 1500,
                        toast: true,
                        position: 'top-end'
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'อ๊ะ! เข้าไม่ได้นะ',
                        text: 'ระบบนี้ให้เฉพาะเด็กหรือบุคลากร สจล. (@kmitl.ac.th) เข้าเท่านั้นครับ 😅',
                        confirmButtonColor: '#ea580c'
            });
                }
            } catch (err) {
                console.error("Login Error: ", err);
            }
        }

        function showApps(name) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('apps-section').classList.remove('hidden');
            // ทำให้กล่องกว้างขึ้นเล็กน้อยเพื่อรองรับ 2 คอลัมน์
            document.getElementById('main-card').classList.add('max-w-4xl');
            document.getElementById('main-card').classList.remove('max-w-sm');
            document.getElementById('user-name').innerText = name.split(' ')[0]; // เอาแค่ชื่อหน้า
        }

        function logout() {
            sessionStorage.removeItem('osda_auth');
            sessionStorage.removeItem('osda_user');
            sessionStorage.removeItem('osda_name');
            location.reload();
        }

        window.onload = function() {
            if(sessionStorage.getItem('osda_auth') === 'true') {
                showApps(sessionStorage.getItem('osda_name') || 'User');
            } else {
                // ถ้ายังไม่ล็อกอิน ให้กล่องแคบลงเพื่อความสวยงาม
                document.getElementById('main-card').classList.remove('max-w-4xl');
                document.getElementById('main-card').classList.add('max-w-sm');
            }
        };
    </script>
</body>
</html>
