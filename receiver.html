<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSDA - Front Desk Pro (Receiver)</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --kmitl: #ea580c; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding-bottom: 80px; }
        .kmitl-gradient { background: linear-gradient(135deg, #ea580c 0%, #c2410c 100%); }
        .input-focus:focus { outline: none; border-color: var(--kmitl); box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-active:active { transform: scale(0.98); opacity: 0.9; }
        input[readOnly] { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; }
    </style>
</head>
<body>

    <header class="kmitl-gradient text-white p-6 rounded-b-[2rem] shadow-lg mb-6">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight">OSDA RECEIVER</h1>
                <p class="text-orange-100 text-sm opacity-90">ระบบลงรับเอกสาร Pro</p>
            </div>
            <div class="bg-white/20 p-2 rounded-full backdrop-blur-md"><i data-lucide="package-search" class="w-6 h-6"></i></div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 space-y-6">
        
        <div class="flex gap-2 p-1 bg-gray-200 rounded-xl">
            <button onclick="setMode('normal')" id="btn-normal" class="flex-1 py-2 px-4 rounded-lg font-bold transition-all bg-white text-orange-600 shadow-sm">บันทึกใหม่</button>
            <button onclick="setMode('backfill')" id="btn-backfill" class="flex-1 py-2 px-4 rounded-lg font-bold transition-all text-gray-500">ย้อนหลัง</button>
        </div>

        <div class="glass-card rounded-3xl shadow-xl border border-white p-6 space-y-5">
            <input type="hidden" id="f_id"><input type="hidden" id="f_sysDate"><input type="hidden" id="f_sysTime">

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">วันที่รับ</label><input type="date" id="f_logDate" onchange="calculateSequence()" class="w-full p-3 rounded-xl border border-gray-200 input-focus font-medium"></div>
                <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">เลขลำดับ</label><input type="text" id="f_seq" readonly class="w-full p-3 rounded-xl border border-gray-200 font-bold text-orange-600"></div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">เวลาที่รับ</label><input type="time" id="f_logTime" class="w-full p-3 rounded-xl border border-gray-200 input-focus"></div>
                <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">สถานะ</label><input type="text" id="f_status" readonly class="w-full p-3 rounded-xl border border-gray-200 font-bold"></div>
            </div>

            <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">ผู้ส่ง / หน่วยงาน</label><input type="text" id="f_sender" placeholder="ระบุชื่อหรือฝ่ายที่ส่งมา" class="w-full p-3 rounded-xl border border-gray-200 input-focus"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">ผู้รับ (ภายใน)</label><input type="text" id="f_receiver" placeholder="ระบุชื่อผู้รับในหน่วยงาน" class="w-full p-3 rounded-xl border border-gray-200 input-focus"></div>
            <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">เรื่อง / รายละเอียด</label><textarea id="f_subject" rows="2" class="w-full p-3 rounded-xl border border-gray-200 input-focus"></textarea></div>

            <div class="space-y-1">
                <label class="text-xs font-bold text-gray-400 uppercase ml-1">หลักฐานเอกสาร (ถ้ามี)</label>
                <label for="file-input" id="drop-zone" class="block border-2 border-dashed border-gray-300 rounded-2xl p-6 text-center hover:bg-orange-50 transition-colors cursor-pointer group">
                    <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFile(this)">
                    <i data-lucide="camera" class="w-8 h-8 mx-auto mb-2 text-gray-400 group-hover:text-orange-500"></i>
                    <p class="text-sm text-gray-500" id="file-label">กดเพื่อถ่ายภาพหรือแนบรูป</p>
                    <input type="hidden" id="f_fileData"><p id="f_fileStatus" class="mt-2 text-xs font-bold text-green-600"></p>
                </label>
            </div>

            <div class="space-y-1"><label class="text-xs font-bold text-gray-400 uppercase ml-1">หมายเหตุ</label><input type="text" id="f_remark" class="w-full p-3 rounded-xl border border-gray-200 input-focus text-sm"></div>

            <div class="flex gap-3 pt-2">
                <button onclick="resetForm()" class="flex-1 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl btn-active">ล้างข้อมูล</button>
                <button onclick="saveData()" class="flex-[2] py-4 kmitl-gradient text-white font-bold rounded-2xl shadow-lg btn-active flex items-center justify-center gap-2"><i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล</button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let currentMode = 'normal';
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzZv1V6AhBHu0h-veSAs95_3vuxKBnbYjTidj9K758b1N3lTvq5ueiVyJBaq4p62UEZ/exec';

        window.onload = () => initForm();

        function initForm() {
            const now = new Date();
            document.getElementById('f_logDate').value = now.toISOString().split('T')[0];
            document.getElementById('f_logTime').value = now.toTimeString().slice(0,5);
            document.getElementById('f_sysDate').value = now.toLocaleDateString('th-TH');
            document.getElementById('f_sysTime').value = now.toLocaleTimeString('th-TH');
            document.getElementById('f_status').value = currentMode === 'normal' ? "รับแล้ว" : "รับย้อนหลัง";
            calculateSequence();
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-normal').className = mode === 'normal' ? "flex-1 py-2 px-4 rounded-lg font-bold bg-white text-orange-600 shadow-sm" : "flex-1 py-2 px-4 rounded-lg font-bold text-gray-500";
            document.getElementById('btn-backfill').className = mode === 'backfill' ? "flex-1 py-2 px-4 rounded-lg font-bold bg-white text-orange-600 shadow-sm" : "flex-1 py-2 px-4 rounded-lg font-bold text-gray-500";
            document.getElementById('f_status').value = mode === 'normal' ? "รับแล้ว" : "รับย้อนหลัง";
            calculateSequence();
        }

        // 🟢 ระบบดึงเลขรันจาก Google Sheets
        async function calculateSequence() {
            try {
                const targetDate = document.getElementById('f_logDate').value;
                const seqDisplayEl = document.getElementById('f_seq');
                if (!targetDate) return;

                seqDisplayEl.value = "กำลังดึงเลข...";
                const res = await fetch(`${SCRIPT_URL}?action=getSeq&date=${targetDate}&mode=${currentMode}&sheetType=receiver`).then(r => r.json());
                if (res.status === 'success') seqDisplayEl.value = res.seq;
            } catch (err) { document.getElementById('f_seq').value = "ไม่สามารถเชื่อมต่อได้"; }
        }

        async function handleFile(input) {
            if (!input.files[0]) return;
            const label = document.getElementById('file-label'); const status = document.getElementById('f_fileStatus');
            label.innerText = "กำลังประมวลผล...";
            try {
                const compressedFile = await imageCompression(input.files[0], { maxSizeMB: 0.4, maxWidthOrHeight: 1280 });
                const reader = new FileReader(); reader.readAsDataURL(compressedFile);
                reader.onload = () => { document.getElementById('f_fileData').value = reader.result; label.innerText = "✅ แนบรูปเรียบร้อย"; status.innerText = "พร้อมส่งข้อมูล"; };
            } catch (error) { label.innerText = "❌ ผิดพลาด"; }
        }

        // 🟢 ระบบบันทึกเข้า Google Sheets (แบบไร้บั๊ก)
        window.saveData = async () => {
            const record = {
                sheetType: 'receiver',
                id: document.getElementById('f_id').value || Date.now().toString(),
                seq: document.getElementById('f_seq').value,
                logDate: document.getElementById('f_logDate').value,
                logTime: document.getElementById('f_logTime').value,
                sender: document.getElementById('f_sender').value,
                receiver: document.getElementById('f_receiver').value,
                subject: document.getElementById('f_subject').value,
                status: document.getElementById('f_status').value,
                remark: document.getElementById('f_remark').value,
                fileData: document.getElementById('f_fileData').value,
                sysDate: document.getElementById('f_sysDate').value,
                sysTime: document.getElementById('f_sysTime').value
            };

            if(!record.sender || !record.subject) return Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอกผู้ส่งและรายละเอียด', 'warning');
            Swal.fire({ title: 'กำลังบันทึกเข้า Cloud...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(record) }).then(r => r.json());
                if(res.status === 'success') Swal.fire('สำเร็จ!', 'บันทึกเข้า Google Sheets แล้ว', 'success').then(() => { resetForm(); initForm(); });
                else throw new Error(res.message);
            } catch (err) { Swal.fire('ผิดพลาด', 'เชื่อมต่ออินเทอร์เน็ตไม่สำเร็จ', 'error'); }
        };

        function resetForm() {
            ['f_id', 'f_sender', 'f_receiver', 'f_subject', 'f_remark', 'f_fileData', 'file-input'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('f_fileStatus').innerText = ''; document.getElementById('file-label').innerText = "กดเพื่อถ่ายภาพหรือแนบรูป";
        }
    </script>
</body>
</html>
