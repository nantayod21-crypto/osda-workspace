<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSDA - Front Desk Pro</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --kmitl: #ea580c; --dark: #1e293b; }
        body { font-family: 'Sarabun', sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px 0; }
        .app-container { max-width: 900px; margin: 0 auto; background-color: #ffffff; min-height: 90vh; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); overflow: hidden; position: relative; }
        .input-box { width: 100%; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; color: #334155; }
        .input-box:focus:not([readonly]) { border-color: var(--kmitl); box-shadow: 0 0 0 3px rgba(234, 88, 12, 0.1); }
        .input-box[readonly] { background-color: #f1f5f9; cursor: not-allowed; color: #64748b; font-weight: bold; border-color: #e2e8f0; }
        .form-label { font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 4px; display: block; }
        
        .page-section { display: none; animation: fadeIn 0.3s ease; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .table-row-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border-left: 4px solid transparent; }
        .row-normal { background-color: #f8fafc; }
        .row-normal:hover { background-color: #f0fdf4; border-left: 4px solid #22c55e; transform: scale(1.005); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.08); z-index: 10; position: relative; }
        .row-backfill { background-color: #fffbeb; }
        .row-backfill:hover { background-color: #fef3c7; border-left: 4px solid #eab308; transform: scale(1.005); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.08); z-index: 10; position: relative; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100">

<div class="app-container">
    
    <div id="pageHub" class="page-section active" style="position: relative;">
        
        <a href="index.html" 
           style="position: absolute; top: 24px; right: 24px; z-index: 999; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: white; border: 1px solid #e2e8f0; box-shadow: 0 2px 4px rgb(0 0 0 / 0.05); cursor: pointer; text-decoration: none;" 
           class="text-slate-400 hover:text-orange-500 transition-colors">
            <i data-lucide="home" style="width: 20px; height: 20px;"></i>
        </a>
        <div class="p-6 sm:p-8 border-b border-slate-100 bg-white">
           
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-black text-slate-800 leading-none">
                        OSDA <span class="text-orange-600">FRONT</span>
                    </h1>
                    <p class="text-xs font-bold text-slate-400 mt-1">ระบบลงทะเบียนหนังสือรับ</p>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button onclick="openForm('new')" class="bg-emerald-600 hover:bg-emerald-700 text-white p-6 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-emerald-600/30 transition-all transform hover:-translate-y-1">
                    <i data-lucide="check-circle" class="w-8 h-8"></i>
                    <span class="text-xl font-bold">รับหนังสือปกติ</span>
                </button>
                <button onclick="openForm('backfill')" class="bg-amber-500 hover:bg-amber-600 text-white p-6 rounded-2xl flex items-center justify-center gap-3 shadow-lg shadow-amber-500/30 transition-all transform hover:-translate-y-1">
                    <i data-lucide="history" class="w-8 h-8"></i>
                    <span class="text-xl font-bold">รับหนังสือย้อนหลัง</span>
                </button>
            </div>
        </div>

        <div class="bg-slate-50 p-6 sm:p-8 min-h-[500px]">
            <div class="flex flex-col sm:flex-row justify-between items-end border-b-2 border-slate-800 pb-3 mb-6 gap-4">
                <h3 class="text-sm font-black text-slate-500 tracking-wider uppercase flex items-center gap-2">
                    <i data-lucide="database" class="w-4 h-4"></i> ทะเบียนรับทั้งหมด
                </h3>
                <div class="flex gap-2 w-full sm:w-auto">
                    <div class="relative w-full sm:w-80">
                        <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ค้นหา เรื่อง, ทะเบียน, จาก, ถึง..." class="w-full pl-9 pr-4 py-2 bg-white border border-slate-300 rounded-lg text-sm focus:border-orange-500 focus:ring-2 focus:ring-orange-100 outline-none shadow-sm transition-all">
                        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-2.5 text-slate-400"></i>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto bg-white rounded-xl shadow-sm border border-slate-200">
                <div class="min-w-[800px]">
                    <div class="bg-[#1e293b] text-white text-xs font-bold p-3 grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-2 text-center">ทะเบียน</div>
                        <div class="col-span-4">รายละเอียดหนังสือ</div>
                        <div class="col-span-2 text-center">สถานะ</div>
                        <div class="col-span-2 text-center">เวลารับจริง</div>
                        <div class="col-span-2 text-center">จัดการ</div>
                    </div>
                    <div id="recordList" class="flex flex-col divide-y divide-slate-100">
                        </div>
                </div>
            </div>
            
            <div id="paginationControls" class="flex justify-between items-center mt-6">
                <button onclick="changePage(-1)" id="btnPrev" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-600 disabled:opacity-30 hover:bg-slate-50 transition shadow-sm">ก่อนหน้า</button>
                <span id="pageInfo" class="text-xs font-bold text-slate-500 bg-white px-4 py-2 rounded-lg border border-slate-200 shadow-sm"></span>
                <button onclick="changePage(1)" id="btnNext" class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-bold text-slate-600 disabled:opacity-30 hover:bg-slate-50 transition shadow-sm">ถัดไป</button>
            </div>
        </div>
    </div>

    <div id="pageForm" class="page-section bg-white min-h-full pb-10">
        <div class="flex items-center gap-4 p-6 border-b border-slate-100 sticky top-0 bg-white z-10 shadow-sm">
            <button onclick="goHome()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-full text-slate-600 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 id="formTitle" class="font-bold text-xl text-slate-800">บันทึกรับหนังสือ</h2>
            
            <div class="ml-auto">
                <div id="formStatusBadge" class="px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-wider border"></div>
                <input type="hidden" id="f_status">
            </div>
        </div>

        <form id="docForm" onsubmit="saveData(event)" class="p-6 sm:p-10 space-y-5 max-w-2xl mx-auto">
            <input type="hidden" id="f_id">
            
            <div class="bg-slate-50 p-6 rounded-2xl border border-slate-200 shadow-sm">
                <div class="mb-4 text-center">
                    <label class="text-sm font-bold text-slate-600 block mb-2">เลขทะเบียนรับ (อัตโนมัติ)</label>
                    <input type="text" id="f_seq" class="w-full text-center text-3xl font-black text-slate-800 bg-transparent border-b-2 border-slate-300 py-2 outline-none" readonly>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 block mb-1 text-center">วันที่บันทึก (System Date)</label>
                        <input type="date" id="f_sysDate" class="w-full text-center text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-lg py-2 outline-none" readonly>
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-slate-500 block mb-1 text-center">เวลาบันทึก (System Time)</label>
                        <input type="time" step="1" id="f_sysTime" class="w-full text-center text-sm font-bold text-slate-600 bg-white border border-slate-200 rounded-lg py-2 outline-none" readonly>
                    </div>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-5 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                <div>
                    <label class="form-label text-blue-700">ลงวันที่รับจริง</label>
                    <input type="date" id="f_logDate" class="input-box font-bold" required onchange="calculateSequence()">
                </div>
                <div>
                    <label class="form-label text-blue-700">เวลารับจริง</label>
                    <input type="time" id="f_logTime" class="input-box font-bold" required>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-5 pt-2">
                <div><label class="form-label">จากใคร</label><input type="text" id="f_sender" class="input-box" required></div>
                <div><label class="form-label">ถึงใคร</label><input type="text" id="f_receiver" class="input-box" required></div>
            </div>
            
            <div><label class="form-label">เรื่อง</label><input type="text" id="f_subject" class="input-box font-bold text-lg py-3" required></div>
            <div><label class="form-label">หมายเหตุ / การปฏิบัติ</label><input type="text" id="f_remark" class="input-box" placeholder="(ถ้ามี)"></div>
            
            <div class="p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300 mt-2 text-center">
                <input type="file" id="f_fileInput" class="hidden" accept="image/*,.pdf">
                <button type="button" onclick="document.getElementById('f_fileInput').click()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-sm font-bold shadow-sm hover:bg-slate-100 flex items-center gap-2 mx-auto">
                    <i data-lucide="paperclip" class="w-4 h-4"></i> แนบไฟล์เอกสาร
                </button>
                <div id="f_fileStatus" class="text-xs text-orange-600 font-bold mt-3"></div>
                <input type="hidden" id="f_fileData"> 
            </div>
            
            <button type="submit" id="btnSubmit" class="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md mt-4 text-lg hover:bg-slate-900 transition active:transform active:scale-95 flex justify-center items-center gap-2">
                <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูล
            </button>
        </form>
    </div>
</div>

<script>
    localforage.config({ name: 'OSDA_STORAGE' });
    <script>
    // 1. ตั้งค่าเริ่มต้น
    let db = [];
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx5VNfb5zVE84iWVZo_6MR3yPqbdb98HQyomHoSiouoRygpdFv4_8gDmx8IT7yfX4Eu/exec';

    // 2. เช็ก Login (ยามเฝ้าประตู)
    window.onload = function() {
        if(sessionStorage.getItem('osda_auth') !== 'true') {
            alert('กรุณาลงชื่อเข้าใช้งานก่อนครับ');
            window.location.href = 'index.html';
            return;
        }
        init();
    }

    // 3. ฟังก์ชันเตรียมพร้อม
    async function init() {
        lucide.createIcons();
        // ดึงข้อมูลเก่าจากเครื่องมาโชว์ก่อน
        db = JSON.parse(localStorage.getItem('OSDA_DB_PRO') || '[]');
        renderList();
    }

    // 4. ฟังก์ชันจัดการวันที่ (ที่เคยทำพัง)
    function formatThaiDateShort(dateStr) {
        if (!dateStr) return "-";
        try {
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: '2-digit' });
        } catch(e) { return dateStr; }
    }

    // 5. ฟังก์ชันบันทึกข้อมูล (ฉบับแก้ไขสมบูรณ์)
    window.saveData = async (e) => {
        if (e) e.preventDefault(); 
        
        // เช็กค่าจาก ID (ป้องกัน Error ถ้าหา ID ไม่เจอ)
        const getVal = (id) => document.getElementById(id) ? document.getElementById(id).value : "";

        try {
            Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const id_value = getVal('f_id');
            const isEdit = id_value ? true : false; 
            const id = isEdit ? id_value : Date.now();
            const fileData = getVal('f_fileData');

            const record = {
                action: isEdit ? 'edit' : 'save',
                sheetType: 'receiver', 
                id: id,
                seq: getVal('f_seq'),
                sysDate: getVal('f_sysDate'),
                sysTime: getVal('f_sysTime'),
                logDate: getVal('f_logDate'),
                logTime: getVal('f_logTime'),
                sender: getVal('f_sender'),
                receiver: getVal('f_receiver'),
                subject: getVal('f_subject'),
                remark: getVal('f_remark'),
                status: getVal('f_status'),
                hasFile: fileData ? true : false
            };

            // 🚀 ยิงขึ้น Cloud
            await fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(record)
            });

            // 💾 บันทึกลงเครื่อง
            let currentDb = JSON.parse(localStorage.getItem('OSDA_DB_PRO') || '[]');
            currentDb = currentDb.filter(x => String(x.id) !== String(id));
            currentDb.push(record);
            localStorage.setItem('OSDA_DB_PRO', JSON.stringify(currentDb));
            db = currentDb;

            if (fileData) {
                await localforage.setItem(`file_${id}`, fileData);
            }

            await Swal.fire({ icon: 'success', title: 'บันทึกสำเร็จ!', timer: 1500 });
            goHome(); 
            renderList();

        } catch (error) {
            console.error(error);
            Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: error.message });
        }
    };

    // 6. ฟังก์ชันจัดการหน้าจอ
    function goForm() {
        document.getElementById('view-list').classList.add('hidden');
        document.getElementById('view-form').classList.remove('hidden');
        document.getElementById('mainForm').reset();
        document.getElementById('f_id').value = "";
        // เซตวันที่/เวลาปัจจุบัน
        const now = new Date();
        document.getElementById('f_sysDate').value = now.toISOString().split('T')[0];
        document.getElementById('f_sysTime').value = now.toTimeString().split(' ')[0].substring(0,5);
    }

    function goHome() {
        document.getElementById('view-form').classList.add('hidden');
        document.getElementById('view-list').classList.remove('hidden');
    }

    // 7. ฟังก์ชันโชว์ตาราง
    function renderList() {
        const listBody = document.getElementById('list-body');
        if (!listBody) return;
        
        // กรองเอาเฉพาะข้อมูลของฝั่ง receiver
        const myData = db.filter(item => item.sheetType === 'receiver');
        
        if (myData.length === 0) {
            listBody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-slate-400">ไม่มีข้อมูลการรับ</td></tr>';
            return;
        }

        listBody.innerHTML = myData.sort((a,b) => b.id - a.id).map(r => `
            <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                <td class="p-4">
                    <div class="font-bold text-slate-700">${r.seq || '-'}</div>
                    <div class="text-[10px] text-slate-400">${formatThaiDateShort(r.logDate)}</div>
                </td>
                <td class="p-4 text-sm">${r.sender || '-'}</td>
                <td class="p-4 text-sm font-medium">${r.subject || '-'}</td>
                <td class="p-4">
                    <span class="px-2 py-1 rounded-full text-[10px] ${r.status==='รับแล้ว'?'bg-green-100 text-green-600':'bg-amber-100 text-amber-600'}">
                        ${r.status || 'รอรับ'}
                    </span>
                </td>
                <td class="p-4 text-right">
                    <button onclick="editRecord('${r.id}')" class="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                </td>
            </tr>
        `).join('');
        lucide.createIcons();
    }

    // 8. ฟังก์ชันแก้ไข/ลบ
    window.editRecord = (id) => {
        const item = db.find(x => String(x.id) === String(id));
        if (!item) return;
        goForm();
        Object.keys(item).forEach(key => {
            const el = document.getElementById('f_' + key);
            if (el) el.value = item[key];
        });
    };
    function handleSearch() {
    const text = document.getElementById('searchInput').value.toLowerCase();
    const filtered = db.filter(item => 
        item.sheetType === 'receiver' && 
        (item.subject.toLowerCase().includes(text) || item.sender.toLowerCase().includes(text))
    );
    renderFilteredList(filtered);
}

function renderFilteredList(data) {
    // ฟังก์ชันนี้จะทำงานเหมือน renderList แต่ใช้ข้อมูลที่กรองแล้ว
    // (ถ้าหน้า receiver มีช่องค้นหา อย่าลืมใส่ id="searchInput" นะครับ)
}

    window.deleteRecord = async (id) => {
    const result = await Swal.fire({
        title: 'ยืนยันการลบ?',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'ลบเลย',
        cancelButtonText: 'ยกเลิก'
    });

    if (result.isConfirmed) {
        db = db.filter(x => String(x.id) !== String(id));
        localStorage.setItem('OSDA_DB_PRO', JSON.stringify(db));
        renderList();
        Swal.fire('ลบเรียบร้อย!', '', 'success');
    }
};
</script>
</script>
</body>
</html>
