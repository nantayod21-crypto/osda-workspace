<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OSDA - Front Desk (Receiver)</title>
    
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .btn-active:active { transform: scale(0.98); }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-md mx-auto">
        <header class="mb-6 flex items-center justify-between">
            <a href="index.html" class="p-2 bg-white rounded-full shadow-sm hover:bg-slate-50"><i data-lucide="arrow-left" class="w-6 h-6 text-slate-600"></i></a>
            <h1 class="text-2xl font-bold text-slate-800">ระบบลงรับเอกสาร</h1>
            <div class="w-10"></div>
        </header>

        <div class="glass-card p-6 rounded-3xl shadow-xl shadow-slate-200 border border-white">
            <form id="receiverForm" class="space-y-4">
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-bold text-slate-400 ml-1">วันที่รับ</label>
                        <input type="date" id="r_date" required class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-slate-400 ml-1">เวลา</label>
                        <input type="time" id="r_time" required class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 ml-1">เลขลำดับรับ (ออโต้)</label>
                    <input type="text" id="r_seq" disabled class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 text-blue-600 font-bold text-center">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 ml-1">จาก (ผู้ส่ง/หน่วยงาน)</label>
                    <input type="text" id="r_sender" required placeholder="ระบุชื่อผู้ส่ง" class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 ml-1">ถึง (ผู้รับภายใน)</label>
                    <input type="text" id="r_receiver" required placeholder="ระบุชื่อผู้รับ" class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                </div>

                <div>
                    <label class="text-xs font-bold text-slate-400 ml-1">เรื่อง / รายละเอียด</label>
                    <textarea id="r_subject" rows="2" required placeholder="ระบุเรื่อง..." class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none"></textarea>
                </div>
                
                <div>
                    <label class="text-xs font-bold text-slate-400 ml-1">หมายเหตุ (ถ้ามี)</label>
                    <input type="text" id="r_remark" placeholder="..." class="w-full p-3 rounded-xl border border-slate-200 focus:border-blue-500 outline-none">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl mt-4 btn-active transition-colors shadow-lg shadow-blue-200 flex justify-center items-center gap-2">
                    <i data-lucide="save" class="w-5 h-5"></i> บันทึกข้อมูลรับเข้า
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        window.onload = () => {
            const now = new Date();
            document.getElementById('r_date').value = now.toISOString().split('T')[0];
            document.getElementById('r_time').value = now.toTimeString().slice(0,5);
            document.getElementById('r_seq').value = Math.floor(100000 + Math.random() * 900000); // จำลองเลขสุ่ม
        };

        document.getElementById('receiverForm').addEventListener('submit', (e) => {
            e.preventDefault();
            Swal.fire({
                icon: 'success',
                title: 'สำเร็จ!',
                text: 'บันทึกข้อมูลรับเข้าเรียบร้อย',
                timer: 1500,
                showConfirmButton: false
            }).then(() => {
                window.location.reload();
            });
        });
    </script>
</body>
</html>
